# Decap CMS — edits research-posts.json. OAuth proxy required on GitHub Pages.
# Proxy: https://github.com/sterlingwes/decap-proxy
backend:
  name: github
  repo: alutterb/alutterb.github.io
  branch: main
  base_url: https://decap-proxy.alutterb.workers.dev
  auth_endpoint: auth

media_folder: uploads
public_folder: uploads

collections:
  - name: research_posts
    label: Research posts
    files:
      - label: Posts file
        name: research_posts_file
        file: research-posts.json
        format: json
        fields:
          - label: Posts
            name: posts
            widget: list
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - label: Id
                name: id
                widget: string
                hint: "Stable id (UUID)."
              - label: Title
                name: title
                widget: string
              - label: Date
                name: date
                widget: datetime
                date_format: YYYY-MM-DD
                time_format: false
                picker_utc: false
              - label: Body
                name: body
                widget: markdown
                hint: "Markdown + LaTeX."
